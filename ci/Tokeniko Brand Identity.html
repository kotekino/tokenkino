document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

height:1.7;\">Regular 400 · Medium 500 · Bold 700.<br>Body copy, labels, UI, captions.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#F4EEDD; border:1px solid #D2C6A8; border-radius:8px; padding:36px;\">\n      <div style=\"font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#8A7F6C; margin-bottom:24px;\">Type scale &amp; the machine label<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"display:flex; align-items:baseline; gap:20px; border-bottom:1px solid #EFE6D0; padding-bottom:16px;\"><span style=\"font-family:'JetBrains Mono', monospace; font-size:10px; color:#8A7F6C; width:96px;\">DISPLAY · 52<\u002Fspan><span style=\"font-family:'Space Mono', monospace; font-weight:700; font-size:52px; letter-spacing:-2px; line-height:1;\">a thinking machine<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; align-items:baseline; gap:20px; border-bottom:1px solid #EFE6D0; padding-bottom:16px;\"><span style=\"font-family:'JetBrains Mono', monospace; font-size:10px; color:#8A7F6C; width:96px;\">HEADING · 28<\u002Fspan><span style=\"font-family:'Space Mono', monospace; font-weight:700; font-size:28px; letter-spacing:-1px;\">geometry to recognise<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; align-items:baseline; gap:20px; border-bottom:1px solid #EFE6D0; padding-bottom:16px;\"><span style=\"font-family:'JetBrains Mono', monospace; font-size:10px; color:#8A7F6C; width:96px;\">BODY · 15<\u002Fspan><span style=\"font-family:'JetBrains Mono', monospace; font-size:15px; color:#4A4339;\">Set warm, generous and legible at 15px / 1.65.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:20px;\"><span style=\"font-family:'JetBrains Mono', monospace; font-size:10px; color:#8A7F6C; width:96px;\">LABEL · 12<\u002Fspan><span style=\"font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#8A7F6C;\">// machine label — tracked 0.18em<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════ 04 · ICONS ════════ -->\n  <section style=\"max-width:1120px; margin:0 auto; padding:64px 40px; border-top:1px solid #D2C6A8;\">\n    <div style=\"display:flex; align-items:baseline; gap:18px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#C24E3A;\">04<\u002Fspan>\n      <h2 style=\"font-family:'Space Mono', monospace; font-weight:700; font-size:34px; letter-spacing:-1px; margin:0;\">Iconography<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"max-width:620px; color:#4A4339; font-size:14px; line-height:1.7; margin:0 0 40px;\">A geometric monoline set on a 24px grid — 1.8px stroke, round caps, espresso ink. Built from circles, lines and polygons so it stays on-brand and reproduces cleanly at any size.<\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns:repeat(6, 1fr); gap:16px;\">\n      <sc-for list=\"{{ icons }}\" as=\"ic\" hint-placeholder-count=\"12\">\n        <div style=\"background:#F4EEDD; border:1px solid #D2C6A8; border-radius:8px; aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;\">\n          <div style=\"width:42px; height:42px; color:#2B2722;\">{{ ic.el }}<\u002Fdiv>\n          <span style=\"font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.08em; color:#8A7F6C;\">{{ ic.name }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════ 05 · BANNER ════════ -->\n  <section style=\"max-width:1120px; margin:0 auto; padding:64px 40px; border-top:1px solid #D2C6A8;\">\n    <div style=\"display:flex; align-items:baseline; gap:18px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#C24E3A;\">05<\u002Fspan>\n      <h2 style=\"font-family:'Space Mono', monospace; font-weight:700; font-size:34px; letter-spacing:-1px; margin:0;\">Banner &amp; social<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"max-width:620px; color:#4A4339; font-size:14px; line-height:1.7; margin:0 0 36px;\">Horizontal lockup with a phosphor CRT panel. The artwork below is sized for LinkedIn (1584×396); the same composition crops to other ratios.<\u002Fp>\n\n    <!-- BANNER ARTWORK 1584x396 -->\n    <div id=\"tk-banner\" style=\"width:1584px; height:396px; transform-origin:top left; transform:scale(0.6529); display:flex; overflow:hidden; border:1px solid #D2C6A8; border-radius:6px; background:#E9DFC8; background-image:radial-gradient(rgba(43,39,34,0.05) 1px, transparent 1px); background-size:5px 5px;\">\n      <div style=\"flex:0 0 600px; background:#C24E3A; display:flex; flex-direction:column; justify-content:center; gap:28px; padding:0 64px; position:relative;\">\n        <div style=\"display:flex; align-items:center; gap:26px;\">\n          <svg width=\"104\" height=\"104\" viewBox=\"0 0 240 240\"><rect x=\"16\" y=\"16\" width=\"208\" height=\"208\" rx=\"32\" fill=\"#F4EEDD\"><\u002Frect><text x=\"120\" y=\"128\" font-family=\"'Space Mono', monospace\" font-weight=\"700\" font-size=\"118\" letter-spacing=\"-6\" fill=\"#C24E3A\" text-anchor=\"middle\" dominant-baseline=\"central\">tk<\u002Ftext><\u002Fsvg>\n          <span style=\"font-family:'Space Mono', monospace; font-weight:700; font-size:62px; letter-spacing:-3px; color:#F4EEDD;\">tokeniko<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono', monospace; font-size:16px; letter-spacing:0.32em; text-transform:uppercase; color:#F4EEDD; opacity:0.85;\">a thinking machine<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1; background:#0E1A14; display:flex; flex-direction:column; justify-content:center; gap:18px; padding:0 64px; position:relative; overflow:hidden;\">\n        <div style=\"position:absolute; inset:0; background:repeating-linear-gradient(#0E1A14 0 3px, rgba(111,227,154,0.05) 3px 4px); pointer-events:none;\"><\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono', monospace; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:#3F8F62; position:relative;\">// transmission 04 — online<\u002Fdiv>\n        <div style=\"font-family:'Space Mono', monospace; font-weight:700; font-size:40px; line-height:1.2; color:#6FE39A; position:relative; text-shadow:0 0 14px rgba(111,227,154,0.35);\">geometry to recognise,<br>algebra to conclude.<\u002Fdiv>\n        <svg width=\"150\" height=\"44\" viewBox=\"0 0 120 48\" fill=\"none\" stroke=\"#6FE39A\" stroke-width=\"2.4\" style=\"position:relative; margin-top:6px;\">\n          <line x1=\"14\" y1=\"34\" x2=\"58\" y2=\"34\"><\u002Fline><line x1=\"58\" y1=\"34\" x2=\"86\" y2=\"14\"><\u002Fline><line x1=\"58\" y1=\"34\" x2=\"104\" y2=\"34\"><\u002Fline>\n          <circle cx=\"14\" cy=\"34\" r=\"5\" fill=\"#0E1A14\"><\u002Fcircle><circle cx=\"58\" cy=\"34\" r=\"6.5\" fill=\"#6FE39A\"><\u002Fcircle><circle cx=\"86\" cy=\"14\" r=\"5\" fill=\"#0E1A14\"><\u002Fcircle><circle cx=\"104\" cy=\"34\" r=\"5\" fill=\"#0E1A14\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:calc(396px * 0.6529 - 396px + 28px);\"><\u002Fdiv>\n    <div style=\"display:flex; gap:28px; flex-wrap:wrap; font-family:'JetBrains Mono', monospace; font-size:12px; color:#8A7F6C;\">\n      <span>· LinkedIn cover — 1584 × 396<\u002Fspan>\n      <span>· X / Twitter header — 1500 × 500<\u002Fspan>\n      <span>· Web banner — 1200 × 300<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════ 06 · ASSETS ════════ -->\n  <section style=\"max-width:1120px; margin:0 auto; padding:64px 40px; border-top:1px solid #D2C6A8;\">\n    <div style=\"display:flex; align-items:baseline; gap:18px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#C24E3A;\">06<\u002Fspan>\n      <h2 style=\"font-family:'Space Mono', monospace; font-weight:700; font-size:34px; letter-spacing:-1px; margin:0;\">Asset index<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"max-width:620px; color:#4A4339; font-size:14px; line-height:1.7; margin:0 0 32px;\">Export-ready files delivered alongside this guide.<\u002Fp>\n    <div style=\"background:#F4EEDD; border:1px solid #D2C6A8; border-radius:8px; padding:8px 0;\">\n      <sc-for list=\"{{ assets }}\" as=\"a\" hint-placeholder-count=\"8\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 28px; border-bottom:1px solid #EFE6D0;\">\n          <span style=\"font-family:'JetBrains Mono', monospace; font-size:13px; color:#2B2722;\">{{ a.file }}<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono', monospace; font-size:11px; color:#8A7F6C;\">{{ a.note }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"max-width:1120px; margin:0 auto; padding:24px 40px; font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#8A7F6C; display:flex; justify-content:space-between;\">\n    <span>tokeniko — brand &amp; identity system<\u002Fspan>\n    <span>end of transmission<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900},&quot;grainTexture&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;constructionGuides&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const grain = (this.props.grainTextu \" x2=\"5.4\" y2=\"18.6\"/>') },\n      { name: 'key', el: mk('<circle cx=\"8\" cy=\"9\" r=\"3.8\"/><line x1=\"10.7\" y1=\"11.7\" x2=\"19\" y2=\"20\"/><line x1=\"16.5\" y1=\"17.5\" x2=\"18.5\" y2=\"15.5\"/><line x1=\"18.5\" y1=\"19.5\" x2=\"20.5\" y2=\"17.5\"/>') },\n      { name: 'message', el: mk('<path d=\"M4 5h16a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H9l-4 4V6a1 1 0 0 1 1-1Z\"/><line x1=\"8\" y1=\"10\" x2=\"16\" y2=\"10\"/>') },\n      { name: 'atom', el: mk('<circle cx=\"12\" cy=\"12\" r=\"1.8\" fill=\"#2B2722\" stroke=\"none\"/><ellipse cx=\"12\" cy=\"12\" rx=\"9\" ry=\"3.6\"/><ellipse cx=\"12\" cy=\"12\" rx=\"9\" ry=\"3.6\" transform=\"rotate(60 12 12)\"/><ellipse cx=\"12\" cy=\"12\" rx=\"9\" ry=\"3.6\" transform=\"rotate(120 12 12)\"/>') },\n      { name: 'power', el: mk('<line x1=\"12\" y1=\"3.5\" x2=\"12\" y2=\"11\"/><path d=\"M7.5 7.2a6.4 6.4 0 1 0 9 0\"/>') },\n      { name: 'layers', el: mk('<polygon points=\"12,3 21,8 12,13 3,8\"/><polyline points=\"3,12 12,17 21,12\"/><polyline points=\"3,16 12,21 21,16\"/>') },\n    ];\n\n    const assets = [\n      { file: 'tokeniko-logo.svg', note: 'vector · primary lockup' },\n      { file: 'tokeniko-emblem.svg', note: 'vector · tk tile' },\n      { file: 'tokeniko-logo-1024.png', note: 'big · transparent' },\n      { file: 'tokeniko-logo-512.png', note: 'standard · transparent' },\n      { file: 'tokeniko-emblem-512.png', note: 'app icon · transparent' },\n      { file: 'tokeniko-emblem-256.png', note: 'small · transparent' },\n      { file: 'tokeniko-favicon-64.png', note: 'favicon · transparent' },\n      { file: 'tokeniko-emblem-mono-ink.png', note: 'single-colour · transparent' },\n      { file: 'small/ — 8 small logos', note: '2 shapes × 4 colourways · svg + png' },\n      { file: 'tokeniko-banner-linkedin.png', note: '1584 × 396' },\n    ];\n\n    return {\n      grainBg: grain,\n      construction: this.props.constructionGuides ?? false,\n      core: [\n        { name: 'Espresso Ink', hex: '#2B2722', rgb: '43 39 34', role: 'Primary text · outlines' },\n        { name: 'Ink Soft', hex: '#4A4339', rgb: '74 67 57', role: 'Secondary text' },\n        { name: 'Muted Clay', hex: '#8A7F6C', rgb: '138 127 108', role: 'Labels · captions' },\n        { name: 'Parchment', hex: '#E9DFC8', rgb: '233 223 200', role: 'Primary background' },\n        { name: 'Paper', hex: '#F4EEDD', rgb: '244 238 221', role: 'Cards · raised panels' },\n        { name: 'Border Sand', hex: '#D2C6A8', rgb: '210 198 168', role: 'Hairlines · dividers' },\n      ],\n      enamel: [\n        { name: 'Atomic Coral', hex: '#C24E3A', rgb: '194 78 58', role: 'Primary accent' },\n        { name: 'Coral Dark', hex: '#A23C2B', rgb: '162 60 43', role: 'Accent · pressed' },\n        { name: 'Enamel Teal', hex: '#2F6E63', rgb: '47 110 99', role: 'Secondary accent' },\n        { name: 'Seafoam Mint', hex: '#7FB3A1', rgb: '127 179 161', role: 'Tints · highlights' },\n        { name: 'Butterscotch', hex: '#D7A33C', rgb: '215 163 60', role: 'Warning · highlight' },\n        { name: 'Faded Denim', hex: '#4E7C8A', rgb: '78 124 138', role: 'Info · links' },\n      ],\n      crt: [\n        { name: 'Phosphor Black', hex: '#0E1A14', rgb: '14 26 20', role: 'CRT background' },\n        { name: 'Phosphor Green', hex: '#6FE39A', rgb: '111 227 154', role: 'CRT primary text' },\n        { name: 'Readout Amber', hex: '#E9B84A', rgb: '233 184 74', role: 'CRT readout · alerts' },\n      ],\n      icons,\n      assets,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
