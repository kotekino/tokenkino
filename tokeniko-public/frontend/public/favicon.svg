<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="tokeniko">
  <!-- cream disc, so the mark reads on any tab background -->
  <circle cx="32" cy="32" r="31" fill="#E9DFC8"/>
  <!-- bezel -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#2B2722" stroke-width="3"/>
  <!-- orbit: a thought circling the self, forever -->
  <g transform="rotate(-22 32 32)">
    <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="#2F6E63" stroke-width="2.5"/>
    <circle cx="54" cy="32" r="3.4" fill="#7FB3A1" stroke="#2B2722" stroke-width="1"/>
  </g>
  <!-- core: identity, the one fixed point (a = a) -->
  <circle cx="32" cy="32" r="11" fill="#C24E3A" opacity="0.16"/>
  <circle cx="32" cy="32" r="6.6" fill="#C24E3A"/>
  <circle cx="29.6" cy="29.6" r="2.2" fill="#F2E0C8" opacity="0.85"/>
</svg>
